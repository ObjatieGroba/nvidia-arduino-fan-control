sensors:
  - name: rtx5060ti
    type: nvidia
    filter: "5060"
  - name: rtx4090
    type: nvidia
    filter: "4090"
  - name: rtx4090wats
    type: nvidia
    filter: "4090"
    sensor: power
    suppress: true
  - name: CPU
    type: hwmon
    hwmon: hwmon4
    suppress: true

fans:
  - name: CPU Fan
    type: hwmon
    hwmon: hwmon4
  - name: Pump Fan
    type: hwmon
    hwmon: hwmon4
    min: 80
  - name: GPU Front
    type: hwmon
    hwmon: hwmon4
    label: "System Fan #1"
  - name: GPU Pump
    type: hwmon
    hwmon: hwmon4
    label: "System Fan #2"
    min: 40
    max: 55
  - name: Front Down
    type: hwmon
    hwmon: hwmon4
    label: "System Fan #3"


controllers:
  - sensor: rtx4090
    fan: GPU Front
    mode: stair
    points:
      - temp: 40
        flow: 0
      - temp: 50
        flow: 30
      - temp: 60
        flow: 50
      - temp: 70
        flow: 100
  - sensor: rtx4090
    fan: Front Down
    mode: stair
    points:
      - temp: 60
        flow: 0
      - temp: 60
        flow: 50
      - temp: 70
        flow: 100
  - sensor: rtx4090
    fan: GPU Pump
    mode: stair
    points:
      - temp: 40
        flow: 40
      - temp: 50
        flow: 40
      - temp: 60
        flow: 100
  - sensor: rtx4090wats
    fan: GPU Front
    mode: stair
    points:
      - temp: 100
        flow: 0
      - temp: 200
        flow: 30
  - sensor: rtx5060ti
    fan: Front Down
    mode: stair
    points:
      - temp: 50
        flow: 0
      - temp: 60
        flow: 50
      - temp: 70
        flow: 100
  - sensor: CPU
    fan: CPU Fan
    mode: stair
    points:
      - temp: 60
        flow: 0
      - temp: 60
        flow: 30
      - temp: 70
        flow: 50
      - temp: 80
        flow: 100
  - sensor: CPU
    fan: Pump Fan
    mode: stair
    points:
      - temp: 50
        flow: 75
      - temp: 60
        flow: 75
      - temp: 70
        flow: 100
